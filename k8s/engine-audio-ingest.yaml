apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: engine-audio-ingest-data
  namespace: vox2vocal
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: engine-audio-ingest
  namespace: vox2vocal
spec:
  selector:
    app: engine-audio-ingest
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-audio-ingest
  namespace: vox2vocal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: engine-audio-ingest
  template:
    metadata:
      labels:
        app: engine-audio-ingest
    spec:
      containers:
        - name: engine-audio-ingest
          image: vox2vocal/engine-audio-ingest:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: ENGINE_AUDIO_INGEST_PORT
            - name: NATS_URL
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: NATS_URL
            - name: NATS_STREAM
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: NATS_AUDIO_STREAM
            - name: NATS_REQUEST_SUBJECT
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: NATS_AUDIO_INGEST_REQUEST_SUBJECT
            - name: NATS_COMPLETED_SUBJECT
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: NATS_AUDIO_INGEST_COMPLETED_SUBJECT
            - name: NATS_FAILED_SUBJECT
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: NATS_AUDIO_INGEST_FAILED_SUBJECT
            - name: STORAGE_BACKEND
              value: local
            - name: LOCAL_STORAGE_ROOT
              value: /data
            - name: FFMPEG_TIMEOUT_SECONDS
              value: "600"
            - name: CANONICAL_SAMPLE_RATE
              value: "48000"
            - name: CANONICAL_CHANNELS
              value: "1"
            - name: LOG_FORMAT
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: LOG_FORMAT
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: LOG_LEVEL
            - name: LOG_SCHEMA_VERSION
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: LOG_SCHEMA_VERSION
            - name: TRACE_PROPAGATION_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: TRACE_PROPAGATION_ENABLED
            - name: LOKI_URL
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: LOKI_URL
            - name: OTEL_SERVICE_NAMESPACE
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: OTEL_SERVICE_NAMESPACE
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
            - name: OTEL_TRACES_EXPORTER
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: OTEL_TRACES_EXPORTER
            - name: OTEL_METRICS_EXPORTER
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: OTEL_METRICS_EXPORTER
            - name: OTEL_LOGS_EXPORTER
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: OTEL_LOGS_EXPORTER
          volumeMounts:
            - name: audio-assets
              mountPath: /data
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: audio-assets
          persistentVolumeClaim:
            claimName: engine-audio-ingest-data
