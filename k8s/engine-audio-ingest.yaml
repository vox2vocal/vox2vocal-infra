apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: engine-audio-ingest-data
  namespace: vox2vocal
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: engine-audio-ingest
  namespace: vox2vocal
spec:
  selector:
    app: engine-audio-ingest
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-audio-ingest
  namespace: vox2vocal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: engine-audio-ingest
  template:
    metadata:
      labels:
        app: engine-audio-ingest
    spec:
      containers:
        - name: engine-audio-ingest
          image: vox2vocal/engine-audio-ingest:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: ENGINE_AUDIO_INGEST_PORT
            - name: NATS_URL
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: NATS_URL
            - name: NATS_STREAM
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: NATS_AUDIO_STREAM
            - name: NATS_REQUEST_SUBJECT
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: NATS_AUDIO_INGEST_REQUEST_SUBJECT
            - name: NATS_COMPLETED_SUBJECT
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: NATS_AUDIO_INGEST_COMPLETED_SUBJECT
            - name: NATS_FAILED_SUBJECT
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: NATS_AUDIO_INGEST_FAILED_SUBJECT
            - name: STORAGE_BACKEND
              value: local
            - name: LOCAL_STORAGE_ROOT
              value: /data/audio-assets
            - name: FFMPEG_TIMEOUT_SECONDS
              value: "600"
            - name: CANONICAL_SAMPLE_RATE
              value: "48000"
            - name: CANONICAL_CHANNELS
              value: "1"
          volumeMounts:
            - name: audio-assets
              mountPath: /data/audio-assets
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: audio-assets
          persistentVolumeClaim:
            claimName: engine-audio-ingest-data
