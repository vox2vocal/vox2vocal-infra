apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: vox2vocal
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vox2vocal-promtail
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - namespaces
      - services
      - endpoints
      - pods
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vox2vocal-promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vox2vocal-promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: vox2vocal
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: vox2vocal
data:
  promtail.yaml: |
    server:
      http_listen_port: 3101
      grpc_listen_port: 0

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-pods
        static_configs:
          - targets:
              - localhost
            labels:
              job: kubernetes-pods
              __path__: /var/log/containers/*_vox2vocal_*.log
        pipeline_stages:
          - regex:
              source: filename
              expression: '^/var/log/containers/(?P<pod>[^_]+)_(?P<namespace>[^_]+)_(?P<container>.+)-(?P<container_id>[a-f0-9]{64})\.log$'
          - template:
              source: service
              template: '{{ .container }}'
          - cri: {}
          - json:
              expressions:
                level: level
                log_domain: log_domain
          - labels:
              namespace:
              pod:
              container:
              service:
              level:
              log_domain:
          - labeldrop:
              - filename
              - job
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: vox2vocal
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
      annotations:
        promtail.config/revision: "2026-06-06-4"
    spec:
      serviceAccountName: promtail
      containers:
        - name: promtail
          image: grafana/promtail:3.2.1
          args:
            - "-config.file=/etc/promtail/promtail.yaml"
          ports:
            - name: http
              containerPort: 3101
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: run
              mountPath: /run/promtail
            - name: pods
              mountPath: /var/log/pods
              readOnly: true
            - name: containers
              mountPath: /var/log/containers
              readOnly: true
            - name: docker-containers
              mountPath: /var/lib/docker/containers
              readOnly: true
          readinessProbe:
            httpGet:
              path: /ready
              port: 3101
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: run
          emptyDir: {}
        - name: pods
          hostPath:
            path: /var/log/pods
        - name: containers
          hostPath:
            path: /var/log/containers
        - name: docker-containers
          hostPath:
            path: /var/lib/docker/containers
