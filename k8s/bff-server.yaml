apiVersion: v1
kind: Service
metadata:
  name: bff-server
  namespace: vox2vocal
spec:
  selector:
    app: bff-server
  ports:
    - name: http
      port: 4000
      targetPort: 4000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff-server
  namespace: vox2vocal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bff-server
  template:
    metadata:
      labels:
        app: bff-server
    spec:
      containers:
        - name: bff-server
          image: vox2vocal/bff-server:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: BFF_PORT
            - name: API_GATEWAY_GRPC_URL
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: API_GATEWAY_GRPC_URL
            - name: BFF_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: BFF_ALLOWED_ORIGINS
            - name: BFF_REFRESH_COOKIE_NAME
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: BFF_REFRESH_COOKIE_NAME
            - name: BFF_REFRESH_COOKIE_SECURE
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: BFF_REFRESH_COOKIE_SECURE
            - name: BFF_REFRESH_COOKIE_SAME_SITE
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: BFF_REFRESH_COOKIE_SAME_SITE
            - name: BFF_REFRESH_COOKIE_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: BFF_REFRESH_COOKIE_DOMAIN
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 20
