apiVersion: v1
kind: ConfigMap
metadata:
  name: vox2vocal-config
  namespace: vox2vocal
data:
  NODE_ENV: development
  BFF_PORT: "4000"
  BFF_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:4000,http://localhost:8081,http://localhost:18083
  BFF_REFRESH_COOKIE_NAME: vox2vocal_refresh_token
  BFF_REFRESH_COOKIE_SECURE: "false"
  BFF_REFRESH_COOKIE_SAME_SITE: Lax
  BFF_REFRESH_COOKIE_DOMAIN: ""
  API_GATEWAY_HTTP_PORT: "3001"
  USER_SERVICE_HTTP_PORT: "3002"
  WORKER_PORT: "3003"
  ENGINE_AUDIO_INGEST_PORT: "8080"
  LOG_FORMAT: json
  LOG_LEVEL: INFO
  LOG_SCHEMA_VERSION: "1.0"
  TRACE_PROPAGATION_ENABLED: "true"
  LOKI_URL: http://loki:3100
  GRAFANA_URL: http://grafana:3000
  OTEL_SERVICE_NAMESPACE: vox2vocal
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  OTEL_TRACES_EXPORTER: none
  OTEL_METRICS_EXPORTER: none
  OTEL_LOGS_EXPORTER: none
  API_GATEWAY_GRPC_URL: api-gateway:50050
  USER_SERVICE_GRPC_URL: user-service:50051
  API_GATEWAY_GRPC_BIND_URL: 0.0.0.0:50050
  USER_SERVICE_GRPC_BIND_URL: 0.0.0.0:50051
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  OBJECT_STORAGE_ENDPOINT_URL: http://minio:9000
  OBJECT_STORAGE_PUBLIC_ENDPOINT_URL: http://localhost:19000
  OBJECT_STORAGE_REGION: us-east-1
  OBJECT_STORAGE_BUCKET: vox2vocal-audio-assets
  PRESIGNED_UPLOAD_EXPIRES_SECONDS: "900"
  NATS_URL: nats://nats:4222
  NATS_AUDIO_STREAM: VOX2VOCAL_AUDIO
  NATS_AUDIO_INGEST_REQUEST_SUBJECT: audio.ingest.requested
  NATS_AUDIO_INGEST_COMPLETED_SUBJECT: audio.ingest.completed
  NATS_AUDIO_INGEST_FAILED_SUBJECT: audio.ingest.failed
