apiVersion: v1
kind: Secret
metadata:
  name: vox2vocal-secret
  namespace: vox2vocal
type: Opaque
stringData:
  POSTGRES_USER: vox2vocal
  POSTGRES_PASSWORD: vox2vocal
  POSTGRES_DB: vox2vocal
  DATABASE_URL: postgresql://vox2vocal:vox2vocal@postgres:15432/vox2vocal?schema=users
  AUDIT_DATABASE_URL: postgresql://vox2vocal:vox2vocal@postgres:15432/vox2vocal?schema=audit
  JWT_ACCESS_SECRET: dev-only-change-me-access-secret
  JWT_REFRESH_SECRET: dev-only-change-me-refresh-secret
  REFRESH_TOKEN_HASH_SECRET: dev-only-change-me-refresh-hash-secret
