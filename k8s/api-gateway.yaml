apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: vox2vocal
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 3001
      targetPort: 3001
    - name: grpc
      port: 50050
      targetPort: 50050
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: vox2vocal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: vox2vocal/api-gateway:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
            - containerPort: 50050
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: API_GATEWAY_HTTP_PORT
            - name: GRPC_URL
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: API_GATEWAY_GRPC_BIND_URL
            - name: USER_SERVICE_GRPC_URL
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: USER_SERVICE_GRPC_URL
            - name: OBJECT_STORAGE_ENDPOINT_URL
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: OBJECT_STORAGE_ENDPOINT_URL
            - name: OBJECT_STORAGE_PUBLIC_ENDPOINT_URL
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: OBJECT_STORAGE_PUBLIC_ENDPOINT_URL
            - name: OBJECT_STORAGE_REGION
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: OBJECT_STORAGE_REGION
            - name: OBJECT_STORAGE_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: OBJECT_STORAGE_BUCKET
            - name: PRESIGNED_UPLOAD_EXPIRES_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: vox2vocal-config
                  key: PRESIGNED_UPLOAD_EXPIRES_SECONDS
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: vox2vocal-secret
                  key: JWT_ACCESS_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: vox2vocal-secret
                  key: JWT_REFRESH_SECRET
            - name: REFRESH_TOKEN_HASH_SECRET
              valueFrom:
                secretKeyRef:
                  name: vox2vocal-secret
                  key: REFRESH_TOKEN_HASH_SECRET
            - name: OBJECT_STORAGE_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: vox2vocal-secret
                  key: OBJECT_STORAGE_ACCESS_KEY_ID
            - name: OBJECT_STORAGE_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: vox2vocal-secret
                  key: OBJECT_STORAGE_SECRET_ACCESS_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
