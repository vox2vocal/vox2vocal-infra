apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: abyul
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 3001
      targetPort: 3001
    - name: grpc
      port: 50050
      targetPort: 50050
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: abyul
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: abyul/api-gateway:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
            - containerPort: 50050
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: abyul-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: abyul-config
                  key: API_GATEWAY_HTTP_PORT
            - name: GRPC_URL
              valueFrom:
                configMapKeyRef:
                  name: abyul-config
                  key: API_GATEWAY_GRPC_BIND_URL
            - name: USER_SERVICE_GRPC_URL
              valueFrom:
                configMapKeyRef:
                  name: abyul-config
                  key: USER_SERVICE_GRPC_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
